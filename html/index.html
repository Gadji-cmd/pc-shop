<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC shop | Главная</title>
    <link rel="stylesheet" href="/styles/main.css">
    <script src="/scripts/main.js" type="module" defer></script>
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <div class="container">
                <div class="logo">
                    <img src="/images/logo.png" alt="logo">
                    <span>PC Shop</span>
                </div>
                <nav>
                    <ul>
                        <li><a href="/">Главная</a></li>
                        <li><a href="/products">Каталог</a></li>
                        <li><a href="/contacts">Контакты</a></li>
                        <li><a href="/cart">Корзина</a></li>
                        <li class="btn"><a href="#" id="btnOpenAuth">Вход</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <main class="container">
            <section class="hero">
                <img src="/images/background.png" alt="hero">
            </section>

            <h2 class="section-title">Популярные ПК</h2>
            <div id="products" class="grid"></div>
        </main>

        <footer class="footer">
            <div class="container footer__inner">
                <p>© 2025 PC Shop — надёжные сборки для работы и игры</p>
            </div>
        </footer>
    </div>

    <dialog id="authDialog" class="auth-dialog">
        <form id="formLogin" class="auth-form">
            <h3>Вход</h3>
            <label>Email<input name="email" type="email" placeholder="you@example.com" required></label>
            <label>Пароль<input name="password" type="password" placeholder="Пароль" minlength="4" required></label>
            <div class="auth-actions">
                <button type="submit" class="btn primary">Войти</button>
                <button type="button" class="btn" id="btnToRegister">Регистрация</button>
                <button type="button" class="btn ghost" id="btnCancelLogin">Отмена</button>
            </div>
            <p id="authMsg" class="auth-msg"></p>
        </form>
    </dialog>

    <dialog id="regDialog" class="auth-dialog">
        <form id="formRegister" class="auth-form">
            <h3>Регистрация</h3>
            <label>Email<input name="email" type="email" placeholder="you@example.com" required></label>
            <label>Пароль<input name="password" type="password" placeholder="Минимум 4 символа" minlength="4" required>
            </label>
            <div class="auth-actions">
                <button type="submit" class="btn primary">Создать</button>
                <button type="button" class="btn ghost" id="btnCancelRegister">Отмена</button>
            </div>
            <p id="regMsg" class="auth-msg"></p>
        </form>
    </dialog>
</body>
</html>
